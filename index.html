            const switchText = document.getElementById('auth-switch-text');
            if (btn.innerText === '登录') {
                title.innerText = '创建新账号';
                btn.innerText = '注册';
                switchText.innerText = '已有账号？去登录';
            } else {
                title.innerText = '欢迎回来';
                btn.innerText = '登录';
                switchText.innerText = '没有账号？点击注册';
            }
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('auth-main-btn');
            if (!email || !pass) return window.showToast("请输入邮箱和密码", true);

            try {
                btn.disabled = true;
                if (btn.innerText === '登录') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) {
                window.showToast("操作失败: " + e.message, true);
            } finally {
                btn.disabled = false;
            }
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.reload());

        // 监听登录状态
        onAuthStateChanged(auth, async (user) => {
            const overlay = document.getElementById('auth-overlay');
            if (user) {
                overlay.classList.add('hidden');
                setSyncStatus('☁️ 正在读取云端...', 'text-yellow-200');
                await syncCloudData(user.uid);
            } else {
                overlay.classList.remove('hidden');
                setSyncStatus('🔒 请登录');
            }
        });

        // ==========================================

            try {
                const docRef = doc(db, "user_data", uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.memoryState = data.memoryState || {};
                    window.deletedWords = data.deletedWords || [];

        // ------------------ API 重试机制 ------------------
        // ------------------ 智能多 Key 轮询与 API 重试机制 ------------------
async function fetchWithBackoff(url, options, retries = Math.max(5, apiKeys.length + 2)) {
    const delays = [1000, 2000, 4000, 8000, 16000];
    let currentUrl = url;

    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(currentUrl, options);

            if (!response.ok) {
                // 当遇到配额耗尽 (429) 或请求受限等报错时，触发 Key 切换
                if (response.status === 429 || response.status === 403 || response.status === 400 || response.status === 503) {
                    switchToNextApiKey();
                    // 动态更新 URL 中的 key 参数
                    currentUrl = currentUrl.replace(/key=([^&]*)/, `key=${getCurrentApiKey()}`);
                    throw new Error(`Quota exceeded or API restricted (Status: ${response.status}). Switching to next Key...`);
                } else {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
            }
            return await response.json();

        } catch (e) {
            if (i === retries - 1) throw e; // 最后一次重试依然失败则向外抛出错误

            // 如果是因为切换 Key 导致的重试，仅需极短延迟即可立刻重新请求
            const delay = e.message.includes('Switching') ? 500 : (delays[i] || 2000);
            await new Promise(res => setTimeout(res, delay));
        }
    }
}

            // 2. 固化记忆曲线进度
            let memoryStr = `window.memoryState = ${JSON.stringify(window.memoryState)};`;
            htmlContent = htmlContent.replace(/window\.memoryState\s*=\s*\{.*?\};/, memoryStr);

            const id = window.currentWord.id;
            const state = window.memoryState[id] || { lvl: 0 };
            const nextLvl = known ? Math.min(3, state.lvl + 1) : 0;
            const intervals = [0, 1, 3, 7];
            window.memoryState[id] = { lvl: nextLvl, next: Date.now() + 24 * 60 * 60 * 1000 * intervals[nextLvl] };
            window.currentWord = null;
            await window.saveData();
            refreshUI();
        }

        window.deleteWord = function(id, event) {
            event.stopPropagation();
            const wordObj = window.vocabData.find(w => w.id === id);

            window.showConfirm(`确定要删除单词 "${wordObj.word}" 吗？删除后它将从您的云端库中彻底消失。`, async () => {
                window.deletedWords.push(id);
                window.vocabData = window.vocabData.filter(w => w.id !== id);
                delete window.memoryState[id];

                if (window.currentWord && window.currentWord.id === id) window.currentWord = null;
                await window.saveData();
                window.showToast(`已删除单词: ${wordObj.word}`);
                refreshUI();

                                    <p class="text-[10px] text-stone-300 leading-tight line-clamp-3 border-t border-stone-600 pt-2 w-full">${w.col}</p>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        window.switchView = function(view) {
            document.getElementById('training-view').classList.toggle('hidden', view !== 'training');
            document.getElementById('library-view').classList.toggle('hidden', view !== 'library');
            document.getElementById('tab-t').className = view === 'training' ? "px-6 py-2 bg-green-800 text-white rounded-full font-bold shadow-lg" : "px-6 py-2 text-stone-400 font-bold";
            document.getElementById('tab-l').className = view === 'library' ? "px-6 py-2 bg-green-800 text-white rounded-full font-bold shadow-lg" : "px-6 py-2 text-stone-400 font-bold";
            if(view === 'library') window.renderLibrary();
        }

        window.speak = function(text, lang) {
            try {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.resume(); window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.rate = 0.85;
                window.currentUtterance = u; window.speechSynthesis.speak(u);
            } catch (e) { console.error("发音失败", e); }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans min-h-screen selection:bg-green-100">

    <div id="auth-overlay" class="fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-stone-900/60 backdrop-blur-sm">
        <div class="glass-effect p-10 rounded-[3rem] w-full max-w-sm shadow-2xl animate-slide text-center">
            <div class="mb-8">
                <span class="text-5xl">🐘</span>
                <h2 id="auth-title" class="text-3xl font-black text-stone-800 mt-4 mb-2">欢迎回来</h2>

            <div class="space-y-4 text-left">
                <input id="email" type="email" placeholder="邮箱" class="w-full px-6 py-4 bg-stone-100 rounded-2xl outline-none focus:ring-2 ring-green-500 transition-all font-bold">
                <input id="password" type="password" placeholder="密码" class="w-full px-6 py-4 bg-stone-100 rounded-2xl outline-none focus:ring-2 ring-green-500 transition-all font-bold">
                <button id="auth-main-btn" onclick="window.handleAuth()" class="w-full py-4 bg-green-700 text-white font-black rounded-2xl shadow-xl hover:bg-green-800 transition-all active:scale-95">登录</button>
            </div>
            <p class="mt-8 text-sm">
                <span id="auth-switch-text" onclick="window.toggleAuthMode()" class="text-green-700 font-bold cursor-pointer hover:underline">没有账号？点击注册</span>
            </p>
        </div>
    </div>

    <header class="bg-green-900 text-white py-8 px-6 shadow-lg border-b-6 border-green-700 relative text-center">
        <button onclick="window.downloadUpdatedHTML()" class="absolute top-3 left-6 bg-amber-500/20 border border-amber-400/50 hover:bg-amber-500 text-amber-200 hover:text-white text-[10px] font-bold px-3 py-1.5 rounded-full">
            ⬇️ 导出备份
        </button>
        <div id="cloud-status" class="absolute top-4 right-6 text-[10px] font-mono bg-black/20 px-3 py-1 rounded-full text-green-200 italic">正在启动...</div>
        <button onclick="window.handleLogout()" class="absolute top-12 left-6 text-[10px] bg-white/10 px-3 py-1 rounded-full hover:bg-white/20">注销退出</button>
        <h1 class="text-2xl md:text-3xl font-black mb-1 mt-4 md:mt-0 tracking-tight">🐘 雅思词汇每日抗遗忘特训</h1>
        <p class="text-green-200 text-xs opacity-80 font-bold uppercase tracking-widest">《杨佳奇 | 龚欣翔 | 张耀文》创始独享版</p>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <nav class="flex justify-center gap-2 mb-8 bg-white p-2 rounded-full shadow-sm w-fit mx-auto border border-stone-200">
            <button id="tab-t" onclick="window.switchView('training')" class="px-6 py-2 bg-green-800 text-white rounded-full font-bold shadow-lg transition-all">🎯 每日特训</button>
            <button id="tab-l" onclick="window.switchView('library')" class="px-6 py-2 text-stone-400 font-bold transition-all hover:text-green-700">📚 词汇总库</button>
        </nav>

        <div id="training-view" class="space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-stone-200 text-center"><p class="text-[10px] font-bold text-stone-400 uppercase">今日复习</p><p id="stat-due" class="text-2xl font-black text-red-500">0</p></div>
                <div class="bg-white p-4 rounded-2xl border border-stone-200 text-center"><p class="text-[10px] font-bold text-stone-400 uppercase">L1 级</p><p id="stat-l1" class="text-2xl font-black text-amber-500">0</p></div>
                <div class="bg-white p-4 rounded-2xl border border-stone-200 text-center"><p class="text-[10px] font-bold text-stone-400 uppercase">L2 级</p><p id="stat-l2" class="text-2xl font-black text-blue-500">0</p></div>
                <div class="bg-white p-4 rounded-2xl border border-stone-200 text-center"><p class="text-[10px] font-bold text-stone-400 uppercase">L3 级</p><p id="stat-l3" class="text-2xl font-black text-green-500">0</p></div>
            </div>
            <div id="test-zone" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-200 min-h-[400px] flex flex-col justify-center animate-slide"></div>

            <section class="bg-purple-900 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden mt-12">
                <div class="absolute top-0 right-0 -mr-12 -mt-12 text-[10rem] opacity-5 select-none font-black italic">IELTS</div>
                <div class="relative z-10 text-center">
                    <h3 class="text-2xl font-black text-purple-200 mb-6">🤖 AI 雅思全功能助教</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-8">
                        <button onclick="window.triggerAI('essay')" class="bg-white/10 hover:bg-white/20 px-4 py-4 rounded-2xl font-bold border border-white/20 transition-all text-sm flex flex-col items-center">✍️ Writing 段落</button>
                        <button onclick="window.triggerAI('speaking')" class="bg-white/10 hover:bg-white/20 px-4 py-4 rounded-2xl font-bold border border-white/20 transition-all text-sm flex flex-col items-center">🗣️ Speaking 考官</button>
                        <button onclick="window.triggerAI('quiz')" class="bg-white/10 hover:bg-white/20 px-4 py-4 rounded-2xl font-bold border border-white/20 transition-all text-sm flex flex-col items-center">🎯 挖空测验</button>
                    </div>
                    <div id="ai-panel" class="hidden bg-stone-50 text-stone-800 p-8 rounded-3xl text-left shadow-inner min-h-[150px] relative">
                        <div id="ai-loader" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center z-10">
                            <div class="animate-spin text-3xl mb-2">🌀</div>
                            <span class="font-bold text-purple-800 text-sm">GEMINI 正在创作...</span>
                        </div>
                        <div id="ai-content" class="font-serif leading-relaxed text-base"></div>
                    </div>
                </div>
            </section>
        </div>
        <div id="library-view" class="hidden space-y-4 animate-slide"></div>
    </main>

    <footer class="text-center py-10 text-stone-400 text-[10px] uppercase tracking-widest">
        <p>IELTS VOCAB v10.0 | 账号云端版 | 所有版权归原作者</p>
    </footer>

</body>
